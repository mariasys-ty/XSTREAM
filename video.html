<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Watch this Movie on Xstream.">
  <title>Watch movie — Xstream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ad.css">

  <!-- ═══════════════════════════════════════════════════════════
       PREMIUM DESKTOP LAYOUT STYLES
       Activates only at ≥1200px — does NOT affect mobile
       ═══════════════════════════════════════════════════════════ -->
  <style>
    /* ─── Design Tokens ─── */
    :root {
      --d-bg: #0a0a0a;
      --d-bg-card: #141414;
      --d-bg-card-hover: #1a1a1a;
      --d-bg-elevated: #1c1c1c;
      --d-bg-glass: rgba(20, 20, 20, 0.75);
      --d-accent: #e50914;
      --d-accent-hover: #ff1a25;
      --d-accent-soft: rgba(229, 9, 20, 0.12);
      --d-accent-glow: rgba(229, 9, 20, 0.25);
      --d-text: #ffffff;
      --d-text-sub: rgba(255, 255, 255, 0.7);
      --d-text-tertiary: rgba(255, 255, 255, 0.45);
      --d-text-muted: rgba(255, 255, 255, 0.25);
      --d-border: rgba(255, 255, 255, 0.08);
      --d-border-light: rgba(255, 255, 255, 0.14);
      --d-border-accent: rgba(229, 9, 20, 0.3);
      --d-shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --d-shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
      --d-shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
      --d-shadow-xl: 0 16px 56px rgba(0, 0, 0, 0.6);
      --d-shadow-glow: 0 0 40px rgba(229, 9, 20, 0.12);
      --d-radius-xs: 4px;
      --d-radius-sm: 6px;
      --d-radius-md: 10px;
      --d-radius-lg: 14px;
      --d-radius-xl: 20px;
      --d-radius-2xl: 24px;
      --d-radius-full: 9999px;
      --d-nav-h: 64px;
      --d-ease: 280ms ease;
      --d-ease-fast: 200ms ease;
      --d-ease-slow: 350ms ease;
      --d-max: 1480px;
      --d-sidebar-w: 370px;
      --d-font: 'Poppins', sans-serif;
      --d-font-alt: 'Inter', sans-serif;
    }

    /* ─── Base Improvements (all screens) ─── */
    html { scroll-behavior: smooth; }

    .navbar {
      backdrop-filter: blur(24px) saturate(180%) !important;
      -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
      background: rgba(10, 10, 10, 0.82) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
      transition: background var(--d-ease), box-shadow var(--d-ease) !important;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    /* ─── Hide Desktop Elements by Default ─── */
    .desktop-sidebar,
    .desktop-player-meta,
    .desktop-social-nav,
    .desktop-related-section {
      display: none;
    }

    /* ═══════════════════════════════════════════════════════════
       DESKTOP LAYOUT — ≥1200px
       ═══════════════════════════════════════════════════════════ */
    @media (min-width: 1200px) {

      /* ─── Main Grid ─── */
      .video-page-main {
        display: grid;
        grid-template-columns: 1fr var(--d-sidebar-w);
        grid-template-rows: auto auto auto auto;
        grid-template-areas:
          "player  sidebar"
          "meta    sidebar"
          "social  sidebar"
          "related related";
        gap: 0 32px;
        max-width: var(--d-max);
        margin: 0 auto;
        padding: 28px 48px 72px;
      }

      /* ─── Override existing mobile grid ─── */
      .video-page-main > .video-page-grid {
        grid-area: player;
        display: block;
        gap: 0;
        padding: 0;
        margin: 0;
        max-width: 100%;
      }

      /* Hide mobile-specific elements */
      .video-page-main > .video-page-grid .video-info,
      .video-page-main > .video-page-grid .social-nav-buttons,
      .video-page-main > .video-page-grid .related-sidebar {
        display: none !important;
      }

      /* ─── Player Styling ─── */
      .video-player-wrapper {
        border-radius: var(--d-radius-xl) !important;
        overflow: hidden;
        box-shadow: var(--d-shadow-lg);
        border: 1px solid var(--d-border);
        position: relative;
        background: #000;
        transition: box-shadow var(--d-ease), border-color var(--d-ease);
      }

      .video-player-wrapper:hover {
        box-shadow: var(--d-shadow-xl);
        border-color: var(--d-border-light);
      }

      .video-player-wrapper video {
        width: 100%;
        aspect-ratio: 16 / 9;
        display: block;
        border-radius: var(--d-radius-xl);
      }

      /* Subtle vignette on player */
      .video-player-wrapper::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: var(--d-radius-xl);
        box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.3);
        pointer-events: none;
        z-index: 2;
      }

      /* ─── Player Meta (below player) ─── */
      .desktop-player-meta {
        grid-area: meta;
        display: block;
        padding: 24px 4px 0;
        animation: fadeUp 0.4s ease both;
      }

      .dpm-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 14px;
      }

      .dpm-title {
        font-family: var(--d-font);
        font-size: clamp(1.5rem, 2.5vw, 2rem);
        font-weight: 800;
        color: var(--d-text);
        line-height: 1.2;
        letter-spacing: -0.02em;
        margin: 0;
      }

      .dpm-badges {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
        padding-top: 4px;
      }

      .dpm-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: var(--d-radius-sm);
        font-family: var(--d-font-alt);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .dpm-badge--quality {
        background: var(--d-accent);
        color: #fff;
      }

      .dpm-badge--lang {
        background: rgba(255, 255, 255, 0.08);
        color: var(--d-text-sub);
        border: 1px solid var(--d-border);
      }

      .dpm-stats {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      .dpm-stat {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: var(--d-font-alt);
        font-size: 0.85rem;
        color: var(--d-text-tertiary);
      }

      .dpm-stat svg {
        width: 15px;
        height: 15px;
        opacity: 0.6;
      }

      .dpm-stat-divider {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--d-text-muted);
      }

      .dpm-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .dpm-action-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        border-radius: var(--d-radius-md);
        font-family: var(--d-font-alt);
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--d-text-sub);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--d-border);
        cursor: pointer;
        transition: all var(--d-ease);
        white-space: nowrap;
      }

      .dpm-action-btn svg {
        width: 17px;
        height: 17px;
        flex-shrink: 0;
      }

      .dpm-action-btn:hover {
        color: var(--d-text);
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--d-border-light);
        transform: translateY(-1px);
      }

      .dpm-action-btn.liked {
        color: var(--d-accent);
        border-color: var(--d-border-accent);
        background: var(--d-accent-soft);
      }

      .dpm-action-btn.disliked {
        color: #f59e0b;
        border-color: rgba(245, 158, 11, 0.3);
        background: rgba(245, 158, 11, 0.08);
      }

      /* ─── Desktop Sidebar ─── */
      .desktop-sidebar {
        grid-area: sidebar;
        display: flex;
        flex-direction: column;
        gap: 0;
        position: sticky;
        top: calc(var(--d-nav-h) + 28px);
        align-self: start;
        max-height: calc(100vh - var(--d-nav-h) - 56px);
        overflow-y: auto;
        overflow-x: hidden;
        border-radius: var(--d-radius-2xl);
        background: var(--d-bg-glass);
        backdrop-filter: blur(20px) saturate(140%);
        -webkit-backdrop-filter: blur(20px) saturate(140%);
        border: 1px solid var(--d-border);
        box-shadow: var(--d-shadow-md);
        animation: fadeLeft 0.5s ease both;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.1) transparent;
      }

      .desktop-sidebar::-webkit-scrollbar { width: 4px; }
      .desktop-sidebar::-webkit-scrollbar-track { background: transparent; }
      .desktop-sidebar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
      }

      /* Poster */
      .ds-poster-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 2 / 3;
        overflow: hidden;
        border-radius: var(--d-radius-2xl) var(--d-radius-2xl) 0 0;
        background: var(--d-bg-card);
      }

      .ds-poster {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
      }

      .ds-poster-wrap:hover .ds-poster {
        transform: scale(1.05);
      }

      .ds-poster-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.35);
        opacity: 0;
        transition: opacity var(--d-ease);
        cursor: pointer;
      }

      .ds-poster-wrap:hover .ds-poster-overlay {
        opacity: 1;
      }

      .ds-poster-play {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--d-accent);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
        transition: transform var(--d-ease), box-shadow var(--d-ease);
      }

      .ds-poster-play svg {
        width: 24px;
        height: 24px;
        color: #fff;
        margin-left: 3px;
      }

      .ds-poster-play:hover {
        transform: scale(1.1);
        box-shadow: 0 0 50px rgba(229, 9, 20, 0.5);
      }

      .ds-poster-quality {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 3px 9px;
        border-radius: var(--d-radius-xs);
        background: var(--d-accent);
        color: #fff;
        font-family: var(--d-font);
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        box-shadow: 0 2px 8px rgba(229, 9, 20, 0.4);
      }

      /* Poster gradient fade into content */
      .ds-poster-wrap::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 100px;
        background: linear-gradient(to top, var(--d-bg-card) 0%, transparent 100%);
        pointer-events: none;
      }

      /* CTA Buttons */
      .ds-cta {
        display: flex;
        gap: 10px;
        padding: 18px 20px 0;
      }

      .ds-btn {
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 16px;
        border-radius: var(--d-radius-md);
        font-family: var(--d-font);
        font-size: 0.85rem;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: all var(--d-ease);
        white-space: nowrap;
      }

      .ds-btn svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      .ds-btn--primary {
        background: var(--d-accent);
        color: #fff;
        box-shadow: 0 4px 16px rgba(229, 9, 20, 0.3);
      }

      .ds-btn--primary:hover {
        background: var(--d-accent-hover);
        box-shadow: 0 6px 24px rgba(229, 9, 20, 0.4);
        transform: translateY(-1px);
      }

      .ds-btn--secondary {
        background: rgba(255, 255, 255, 0.06);
        color: var(--d-text-sub);
        border: 1px solid var(--d-border);
      }

      .ds-btn--secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--d-text);
        border-color: var(--d-border-light);
        transform: translateY(-1px);
      }

      /* Sidebar Info */
      .ds-info {
        padding: 18px 20px 0;
      }

      .ds-title {
        font-family: var(--d-font);
        font-size: 1.15rem;
        font-weight: 800;
        color: var(--d-text);
        line-height: 1.3;
        margin: 0 0 16px;
        letter-spacing: -0.01em;
      }

      /* Metadata Grid */
      .ds-meta-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px 16px;
        margin-bottom: 18px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: var(--d-radius-md);
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      .ds-meta-item {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .ds-meta-label {
        font-family: var(--d-font-alt);
        font-size: 0.68rem;
        font-weight: 500;
        color: var(--d-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .ds-meta-value {
        font-family: var(--d-font-alt);
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--d-text-sub);
      }

      .ds-meta-value--rating {
        color: #facc15;
        font-weight: 700;
      }

      /* Genres */
      .ds-genres {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
      }

      .ds-genre-tag {
        padding: 5px 12px;
        border-radius: var(--d-radius-full);
        font-family: var(--d-font-alt);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--d-text-tertiary);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: all var(--d-ease-fast);
        cursor: default;
      }

      .ds-genre-tag:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--d-text-sub);
        border-color: var(--d-border-light);
      }

      /* Description */
      .ds-description {
        font-family: var(--d-font-alt);
        font-size: 0.84rem;
        color: var(--d-text-tertiary);
        line-height: 1.7;
        margin: 0 0 4px;
        display: -webkit-box;
        -webkit-line-clamp: 5;
        -webkit-box-orient: vertical;
        overflow: hidden;
        white-space: pre-wrap;
      }

      /* Divider */
      .ds-divider {
        height: 1px;
        margin: 16px 20px;
        background: var(--d-border);
      }

      /* Sidebar Actions */
      .ds-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 0 20px 20px;
      }

      .ds-action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 10px 12px;
        border-radius: var(--d-radius-md);
        font-family: var(--d-font-alt);
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--d-text-tertiary);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--d-border);
        cursor: pointer;
        transition: all var(--d-ease);
        white-space: nowrap;
      }

      .ds-action-btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .ds-action-btn:hover {
        color: var(--d-text);
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--d-border-light);
        transform: translateY(-1px);
      }

      .ds-action-btn.liked {
        color: var(--d-accent);
        border-color: var(--d-border-accent);
        background: var(--d-accent-soft);
      }

      .ds-action-btn.favourited {
        color: #ec4899;
        border-color: rgba(236, 72, 153, 0.3);
        background: rgba(236, 72, 153, 0.08);
      }

      /* ─── Desktop Social Nav ─── */
      .desktop-social-nav {
        grid-area: social;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 24px 4px 0;
        animation: fadeUp 0.45s ease both;
        animation-delay: 0.1s;
      }

      .ds-nav-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: var(--d-radius-full);
        font-family: var(--d-font-alt);
        font-size: 0.82rem;
        font-weight: 600;
        text-decoration: none;
        transition: all var(--d-ease);
        border: 1px solid var(--d-border);
      }

      .ds-nav-btn svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      .ds-nav-btn--telegram {
        background: rgba(0, 136, 204, 0.1);
        color: #38bdf8;
        border-color: rgba(0, 136, 204, 0.2);
      }

      .ds-nav-btn--telegram:hover {
        background: rgba(0, 136, 204, 0.18);
        border-color: rgba(0, 136, 204, 0.35);
        transform: translateY(-1px);
      }

      .ds-nav-btn--whatsapp {
        background: rgba(37, 211, 102, 0.1);
        color: #4ade80;
        border-color: rgba(37, 211, 102, 0.2);
      }

      .ds-nav-btn--whatsapp:hover {
        background: rgba(37, 211, 102, 0.18);
        border-color: rgba(37, 211, 102, 0.35);
        transform: translateY(-1px);
      }

      .ds-nav-btn--youtube {
        background: rgba(229, 9, 20, 0.1);
        color: #f87171;
        border-color: rgba(229, 9, 20, 0.2);
      }

      .ds-nav-btn--youtube:hover {
        background: rgba(229, 9, 20, 0.18);
        border-color: rgba(229, 9, 20, 0.35);
        transform: translateY(-1px);
      }

      /* ─── Desktop Related Section ─── */
      .desktop-related-section {
        grid-area: related;
        display: block;
        padding-top: 40px;
        animation: fadeUp 0.5s ease both;
        animation-delay: 0.15s;
      }

      .drs-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .drs-title {
        font-family: var(--d-font);
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--d-text);
        margin: 0;
        letter-spacing: -0.01em;
      }

      .drs-see-all {
        font-family: var(--d-font-alt);
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--d-accent);
        text-decoration: none;
        transition: color var(--d-ease-fast);
      }

      .drs-see-all:hover {
        color: var(--d-accent-hover);
      }

      /* Related Grid */
      .drs-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 20px;
      }

      @media (min-width: 1200px) and (max-width: 1399px) {
        .drs-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      @media (min-width: 1200px) and (max-width: 1280px) {
        .drs-grid {
          grid-template-columns: repeat(3, 1fr);
        }
        .video-page-main {
          gap: 0 24px;
          padding: 24px 32px 60px;
        }
        .desktop-sidebar {
          max-width: 320px;
        }
      }

      /* Related Card */
      .drs-card {
        display: block;
        text-decoration: none;
        border-radius: var(--d-radius-lg);
        overflow: hidden;
        background: var(--d-bg-card);
        border: 1px solid var(--d-border);
        transition: all var(--d-ease);
        cursor: pointer;
      }

      .drs-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--d-shadow-lg), var(--d-shadow-glow);
        border-color: var(--d-border-light);
      }

      .drs-card-poster {
        position: relative;
        width: 100%;
        aspect-ratio: 2 / 3;
        overflow: hidden;
        background: #111;
      }

      .drs-card-poster img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
      }

      .drs-card:hover .drs-card-poster img {
        transform: scale(1.08);
      }

      .drs-card-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.4);
        opacity: 0;
        transition: opacity var(--d-ease);
      }

      .drs-card:hover .drs-card-overlay {
        opacity: 1;
      }

      .drs-card-play {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: var(--d-accent);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 24px rgba(229, 9, 20, 0.5);
        transform: scale(0.8);
        transition: transform var(--d-ease);
      }

      .drs-card:hover .drs-card-play {
        transform: scale(1);
      }

      .drs-card-play svg {

        display: -webkit-box;

        -webkit-box-orient: vertical;
        overflow: hidden;
        transition: color var(--d-ease-fast);

        color: #fff;

        font-family: var(--d-font-alt);
        font-size: 0.72rem;

      }

        font-size: 0.9rem;
        font-weight: 700;
        color: var(--d-text-tertiary);
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

        padding: 80px 24px;

        height: 56px;

        font-weight: 700;
        color: var(--d-text);

        font-size: 0.9rem;
        color: var(--d-text-tertiary);
        margin: 0 0 24px;
      }

        display: inline-flex;
        align-items: center;
        padding: 10px 24px;
        border-radius: var(--d-radius-md);
        background: var(--d-accent);
        color: #fff;
        font-family: var(--d-font);
        font-size: 0.85rem;
        font-weight: 700;
        text-decoration: none;
        transition: all var(--d-ease);
      }

        background: var(--d-accent-hover);
        transform: translateY(-1px);
      }
    }

    /* ═══════════════════════════════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════════════════════════════ */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);

      to {
        opacity: 1;
        transform: translateY(0);
      }

      from {
        opacity: 0;

    }

        transition-duration: 0.01ms !important;

  <!-- Watch Time Tracking -->
  <script>
    (function() {
      'use strict';
      var VIDEO_ELEMENT_ID = 'videoPlayer';
      var isTracking = false;
      var isPaused = false;
      var currentMovieId = null;
      var currentUserId = null;
      var currentTitle = '';
      var positionInterval = null;

      function getVideoPlayer(callback, retries) {
        retries = retries || 0;
        var maxRetries = 20;
        var player = document.getElementById(VIDEO_ELEMENT_ID);
        if (!player) {
          var fallbacks = ['video', '#player', '.video-player', 'video[controls]'];
          for (var i = 0; i < fallbacks.length; i++) {
            player = document.querySelector(fallbacks[i]);
            if (player) { break; }
          }
        }
        if (player) { callback(player); return; }
        if (retries < maxRetries) {
          setTimeout(function() { getVideoPlayer(callback, retries + 1); }, 250);
        }
      }

      function getMovieInfo() {
        var params = new URLSearchParams(window.location.search);
        return {
          id: params.get('id') || params.get('movie') || params.get('episode') || 'unknown',
          title: document.title || 'Unknown Title'
        };
      }

      function getUserId() {
        try {
          if (typeof auth !== 'undefined' && auth && auth.currentUser) return auth.currentUser.uid;
          if (typeof AppState !== 'undefined' && AppState && AppState.currentUser) return AppState.currentUser.uid;
        } catch (e) {}
        return null;
      }

      function startTracking(player) {
        if (!player || isTracking) return;
        currentMovieId = getMovieInfo().id;
        currentUserId = getUserId();
        currentTitle = getMovieInfo().title;

        player.addEventListener('loadedmetadata', function() {
          if (typeof WatchTime !== 'undefined') {
            WatchTime.startWatching(currentMovieId, currentUserId, currentTitle, player.duration);
            isTracking = true; isPaused = false;
          }
        });

        if (player.readyState >= 1 && player.duration > 0) {
          if (typeof WatchTime !== 'undefined' && !isTracking) {
            WatchTime.startWatching(currentMovieId, currentUserId, currentTitle, player.duration);
            isTracking = true;
          }
        }

        player.addEventListener('play', function() {
          if (!isTracking) {
            if (typeof WatchTime !== 'undefined') {
              WatchTime.startWatching(currentMovieId, currentUserId, currentTitle, player.duration || 0);
              isTracking = true; isPaused = false;
            }
          } else if (isPaused) {
            if (typeof WatchTime !== 'undefined') { WatchTime.resumeWatching(); isPaused = false; }
          }
        });

        player.addEventListener('pause', function() {
          if (!isTracking || player.ended) return;
          if (typeof WatchTime !== 'undefined') { WatchTime.pauseWatching(); isPaused = true; }
        });

        player.addEventListener('ended', function() {
          if (isTracking && typeof WatchTime !== 'undefined') {
            WatchTime.completeMovie(currentMovieId, currentUserId);
            isTracking = false; isPaused = false; stopPositionUpdates();
          }
        });

        startPositionUpdates(player);
      }

      function startPositionUpdates(player) {
        stopPositionUpdates();
        positionInterval = setInterval(function() {
          if (!player || !isTracking || isPaused || player.paused || player.ended) return;
          if (typeof WatchTime !== 'undefined') WatchTime.updateWatchTime(currentMovieId, currentUserId, player.currentTime);
        }, 3000);
      }

      function stopPositionUpdates() {
        if (positionInterval) { clearInterval(positionInterval); positionInterval = null; }
      }

      window.addEventListener('beforeunload', function() {
        stopPositionUpdates();
        if (isTracking && typeof WatchTime !== 'undefined') {
          var player = document.getElementById(VIDEO_ELEMENT_ID);
          if (player && !player.ended && !player.paused) WatchTime.stopWatching(currentMovieId, currentUserId);
        }
      });

      function init() {
        if (typeof WatchTime === 'undefined') return;
        getVideoPlayer(function(player) { startTracking(player); });
      }

      if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); }
      else { init(); }
    })();
  </script>

   <!-- ═══════════════════════════════════════════════════════════
       DESKTOP LAYOUT SYNC SCRIPT v2
       Robust data extraction with MutationObserver + polling
       ═══════════════════════════════════════════════════════════ -->
  <script>
    (function() {
      'use strict';

      var synced = false;
      var relatedSynced = false;

      /* ─── Helpers ─── */
      function $(id) { return document.getElementById(id); }
      function textOf(id) {
        var el = $(id);
        if (!el) return '';
        /* Get text from first <span> if exists, else full text */
        var span = el.querySelector('span');
        return span ? span.textContent.trim() : el.textContent.trim();
      }
      function setTxt(id, val) {
        if (!val || !val.trim()) return;
        var el = $(id);
        if (el) el.textContent = val.trim();
      }
      function og(name) {
        var m = document.querySelector('meta[property="og:' + name + '"]');
        return m ? m.content.trim() : '';
      }

      /* ─── Find poster image from ANY source ─── */
      function findPoster() {
        /* 1. og:image */
        var url = og('image');
        if (url && url.indexOf('data:') === -1) return url;

        /* 2. Any image inside the player wrapper */
        var playerImg = document.querySelector('#video-player-wrapper img');
        if (playerImg && playerImg.src && playerImg.src.indexOf('data:') === -1 && playerImg.naturalWidth > 50) {
          return playerImg.src;
        }

        /* 3. First image in related videos */
        var relImg = document.querySelector('#related-videos img');
        if (relImg && relImg.src && relImg.src.indexOf('data:') === -1) return relImg.src;

        /* 4. Any img with poster/cover in class or data attr */
        var allImgs = document.querySelectorAll('img[class*="poster"], img[class*="cover"], img[data-poster], img[data-thumb]');
        for (var i = 0; i < allImgs.length; i++) {
          if (allImgs[i].src && allImgs[i].src.indexOf('data:') === -1 && allImgs[i].naturalWidth > 50) {
            return allImgs[i].src;
          }
        }

        /* 5. Twitter image meta */
        var twImg = document.querySelector('meta[name="twitter:image"]');
        if (twImg && twImg.content) return twImg.content;

        return '';
      }

      /* ─── Extract metadata from multiple sources ─── */
      function extractMeta() {
        var params = new URLSearchParams(window.location.search);
        var desc = textOf('video-description') || og('description') || '';
        var title = textOf('video-title') || document.title || '';
        var result = {};

        /* Year — try URL, then regex from description, then title */
        result.year = params.get('year') || '';
        if (!result.year) {
          var ym = desc.match(/\b((?:19|20)\d{2})\b/);
          if (ym) result.year = ym[1];
        }
        if (!result.year) {
          var ym2 = title.match(/\b((?:19|20)\d{2})\b/);
          if (ym2) result.year = ym2[1];
        }

        /* Runtime — regex patterns from description */
        result.runtime = params.get('runtime') || params.get('duration') || '';
        if (!result.runtime) {
          var rm = desc.match(/(\d+)\s*(?:hr|h|hour|hours)\s*(?:(\d+)\s*(?:min|m|minute|minutes))?/i);
          if (rm) {
            result.runtime = rm[2] ? rm[1] + 'h ' + rm[2] + 'm' : rm[1] + 'h';
          } else {
            var rm2 = desc.match(/(\d+)\s*(?:min|m|minutes)\b/i);
            if (rm2) result.runtime = rm2[1] + ' min';
          }
        }
        if (!result.runtime) {
          var rm3 = desc.match(/(\d{1,3}):(\d{2})\b/);
          if (rm3) result.runtime = rm3[1] + 'h ' + rm3[2] + 'm';
        }

        /* Rating — URL, og, or regex */
        result.rating = params.get('rating') || params.get('imdb') || params.get('score') || '';
        if (!result.rating) {
          var rtm = desc.match(/(?:IMDb|Rating|Score)[:\s]*(\d+\.?\d*)(?:\s*\/\s*10)?/i);
          if (rtm) result.rating = rtm[1] + '/10';
        }

        /* Quality */
        result.quality = params.get('quality') || og('quality') || '';
        if (!result.quality) {
          var qm = desc.match(/\b(4K|UHD|1080p|720p|HD|SD|CAM|HDRIP|WEBRIP|BRRIP|BluRay|WEB-DL)\b/i);
          if (qm) result.quality = qm[1].toUpperCase();
        }

        /* Language */
        result.language = params.get('language') || params.get('lang') || og('language') || og('locale') || '';
        if (!result.language) {
          var lm = desc.match(/(?:Language|Lang)[:\s]*([A-Za-z\s]+?)(?:\n|,|\.|\s*$)/im);
          if (lm) result.language = lm[1].trim();
        }

        /* Country */
        result.country = params.get('country') || '';
        if (!result.country) {
          result.country = textOf('video-country-badge');
        }

        /* Genres — extract from description or URL */
        result.genres = params.get('category') || params.get('genre') || '';
        if (!result.genres) {
          var gm = desc.match(/(?:Genre|Genres)[:\s]*([A-Za-z\s,\/]+?)(?:\n|\.|\s*$)/im);
          if (gm) result.genres = gm[1].trim();
        }

        return result;
      }

      /* ─── Render genres as tags ─── */
      function renderGenres(genreStr) {
        var container = $('ds-genres');
        if (!container || !genreStr) return;

        /* Only render if empty */
        if (container.children.length > 0) return;

        var genres = genreStr.split(/[,\/|]+/);
        genres.forEach(function(g) {
          g = g.trim();
          if (g.length < 2 || g.length > 25) return;
          var tag = document.createElement('span');
          tag.className = 'ds-genre-tag';
          tag.textContent = g;
          container.appendChild(tag);
        });
      }

      /* ─── Apply all metadata to sidebar ─── */
      function applyMeta() {
        var meta = extractMeta();
        var title = textOf('video-title');

        if (!title) return false; /* Data not loaded yet */

        /* Title */
        setTxt('ds-title', title);
        setTxt('dpm-title', title);

        /* Poster */
        var poster = findPoster();
        if (poster) {
          var dsPoster = $('ds-poster');
          if (dsPoster && dsPoster.src.indexOf('data:image') === 0) {
            dsPoster.src = poster;
          }
        }

        /* Description */
        setTxt('ds-description', textOf('video-description'));

        /* Metadata fields */
        setTxt('ds-rating', meta.rating || '—');
        setTxt('ds-runtime', meta.runtime || '—');
        setTxt('ds-year', meta.year || '—');
        setTxt('ds-language', meta.language || '—');
        setTxt('ds-country', meta.country || '—');
        setTxt('ds-quality', meta.quality || '—');

        /* Quality badge on poster */
        if (meta.quality) {
          setTxt('ds-poster-quality', meta.quality.toUpperCase());
          setTxt('dpm-quality-badge', meta.quality.toUpperCase());
        }

        /* Genres */
        renderGenres(meta.genres);

        /* Player meta */
        setTxt('dpm-views', textOf('video-views'));
        setTxt('dpm-date', textOf('video-date'));
        setTxt('dpm-country', textOf('video-country-badge'));
        setTxt('dpm-like-count', textOf('like-count'));
        setTxt('dpm-dislike-count', textOf('dislike-count'));

        /* Show player meta */
        var dpm = $('desktop-player-meta');
        if (dpm) dpm.style.display = 'block';

        return true;
      }

      /* ─── Sync related videos to desktop grid ─── */
      function syncRelated() {
        var source = $('related-videos');
        var grid = $('drs-grid');
        var section = $('desktop-related-section');
        if (!source || !grid || !section) return false;

        /* Broadest possible selector for related items */
        var items = source.querySelectorAll('a, .widget-video-item, [class*="related-item"], [class*="video-item"]');
        var realItems = [];

        items.forEach(function(item) {
          /* Must have a link or be a link itself */
          var href = item.getAttribute('href') || item.querySelector('a[href]') ;
          if (!href) return;
          if (typeof href === 'object') href = href.getAttribute('href');
          if (!href || href === '#') return;

          /* Must have an image */
          var img = item.querySelector('img');
          if (!img) return;

          realItems.push({ el: item, href: href, img: img });
        });

        if (realItems.length === 0) return false;

        /* Don't re-render if same count */
        if (relatedSynced && grid.children.length === realItems.length) {
          /* Just update images that might have lazy-loaded */
          realItems.forEach(function(item, i) {
            var cardImg = grid.children[i] ? grid.children[i].querySelector('img') : null;
            if (cardImg && cardImg.src.indexOf('data:') === 0 && item.img.src.indexOf('data:') !== 0) {
              cardImg.src = item.img.src;
            }
          });
          return true;
        }

        grid.innerHTML = '';

        realItems.forEach(function(item) {
          var titleEl = item.el.querySelector('h3, h4, h5, [class*="title"], [class*="name"]');
          var metaEl = item.el.querySelector('[class*="meta"], [class*="info"], [class*="detail"]');
          var durEl = item.el.querySelector('[class*="duration"], [class*="runtime"], [class*="time"]');
          var titleText = titleEl ? titleEl.textContent.trim() : 'Untitled';
          var metaText = metaEl ? metaEl.textContent.trim() : '';
          var durText = durEl ? durEl.textContent.trim() : '';
          var imgSrc = item.img.src || '';

          /* Skip placeholder images */
          if (imgSrc.indexOf('data:') === 0) imgSrc = '';

          var card = document.createElement('a');
          card.href = item.href;
          card.className = 'drs-card';
          card.innerHTML =
            '<div class="drs-card-poster">' +
              (imgSrc ? '<img src="' + imgSrc + '" alt="' + titleText.replace(/"/g, '&quot;') + '" loading="lazy">' : '<div style="width:100%;height:100%;background:#1a1a1a"></div>') +
              '<div class="drs-card-overlay"><div class="drs-card-play"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>' +
              (durText ? '<span class="drs-card-duration">' + durText + '</span>' : '') +
              '<span class="drs-card-quality">HD</span>' +
            '</div>' +
            '<div class="drs-card-info">' +
              '<h4 class="drs-card-title">' + titleText + '</h4>' +
              (metaText ? '<span class="drs-card-meta">' + metaText + '</span>' : '') +
            '</div>';

          grid.appendChild(card);
        });

        relatedSynced = true;
        section.style.display = 'block';
        return true;
      }

      /* ─── Wire desktop buttons → mobile buttons ─── */
      function wireButtons() {
        var map = [
          ['dpm-like',        'like-btn'],
          ['dpm-dislike',     'dislike-btn'],
          ['dpm-share',       'share-btn'],
          ['dpm-favourite',   'favourite-btn'],
          ['dpm-download',    'download-btn'],
          ['ds-like-btn',     'like-btn'],
          ['ds-fav-btn',      'favourite-btn'],
          ['ds-share-btn',    'share-btn'],
          ['ds-download-btn', 'download-btn']
        ];

        map.forEach(function(pair) {
          var dBtn = $(pair[0]);
          var mBtn = $(pair[1]);
          if (dBtn && mBtn) {
            dBtn.addEventListener('click', function(e) {
              e.preventDefault();
              mBtn.click();
            });
          }
        });

        /* Watch Now & Poster Play */
        ['ds-watch-btn', 'ds-poster-play'].forEach(function(id) {
          var btn = $(id);
          if (!btn) return;
          btn.addEventListener('click', function() {
            var w = $('video-player-wrapper');
            if (w) w.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(function() {
              var v = w ? w.querySelector('video') : null;
              if (v && v.paused) v.play().catch(function(){});
            }, 500);
          });
        });

        /* My List → favourite */
        var listBtn = $('ds-list-btn');
        if (listBtn) {
          listBtn.addEventListener('click', function() {
            var fb = $('favourite-btn');
            if (fb) fb.click();
          });
        }
      }

      /* ─── Sync button states continuously ─── */
      function syncStates() {
        var likeBtn = $('like-btn');
        var dislikeBtn = $('dislike-btn');
        var favBtn = $('favourite-btn');

        ['dpm-like', 'ds-like-btn'].forEach(function(id) {
          var btn = $(id);
          if (btn && likeBtn) btn.classList.toggle('liked', likeBtn.classList.contains('liked'));
        });

        var dd = $('dpm-dislike');
        if (dd && dislikeBtn) dd.classList.toggle('disliked', dislikeBtn.classList.contains('disliked'));

        var df = $('dpm-favourite');
        var dsf = $('ds-fav-btn');
        if (df && favBtn) df.classList.toggle('liked', favBtn.classList.contains('liked'));
        if (dsf && favBtn) dsf.classList.toggle('favourited', favBtn.classList.contains('liked'));

        setTxt('dpm-like-count', textOf('like-count'));
        setTxt('dpm-dislike-count', textOf('dislike-count'));
      }

      /* ─── MutationObserver — react when app.js inserts data ─── */
      function watchForData() {
        var targets = [
          { el: $('video-info'),     handler: function() { synced = applyMeta(); } },
          { el: $('related-videos'), handler: function() { syncRelated(); } }
        ];

        targets.forEach(function(t) {
          if (!t.el) return;
          var observer = new MutationObserver(function() {
            t.handler();
          });
          observer.observe(t.el, { childList: true, subtree: true });
        });
      }

      /* ─── Also watch for new images loading (lazy load) ─── */
      function watchImages() {
        document.addEventListener('load', function(e) {
          if (e.target.tagName === 'IMG') {
            /* Update poster if sidebar still has placeholder */
            var dsPoster = $('ds-poster');
            if (dsPoster && dsPoster.src.indexOf('data:') === 0) {
              var poster = findPoster();
              if (poster) dsPoster.src = poster;
            }

            /* Update related card images */
            if (relatedSynced) {
              var cards = document.querySelectorAll('.drs-card-poster img');
              cards.forEach(function(cardImg) {
                if (cardImg.src.indexOf('data:') === 0) {
                  /* Find matching source image */
                  var srcImgs = document.querySelectorAll('#related-videos img');
                  for (var i = 0; i < srcImgs.length; i++) {
                    if (srcImgs[i] === e.target) {
                      if (e.target.src.indexOf('data:') !== 0) {
                        cardImg.src = e.target.src;
                      }
                      break;
                    }
                  }
                }
              });
            }
          }
        }, true);
      }

      /* ─── Polling fallback ─── */
      function poll() {
        var attempts = 0;
        var maxAttempts = 120; /* 120 * 500ms = 60 seconds */
        var interval = setInterval(function() {
          attempts++;

          /* Try to sync meta */
          if (!synced) {
            synced = applyMeta();
          } else {
            /* Even after synced, re-check poster and description */
            var poster = findPoster();
            if (poster) {
              var dsPoster = $('ds-poster');
              if (dsPoster && dsPoster.src.indexOf('data:') === 0) {
                dsPoster.src = poster;
              }
            }
            setTxt('ds-description', textOf('video-description'));
          }

          /* Try to sync related */
          syncRelated();

          /* Sync button states */
          syncStates();

          if (attempts >= maxAttempts) {
            clearInterval(interval);
          }
        }, 500);
      }

      /* ─── INIT ─── */
      function init() {
        wireButtons();
        watchForData();
        watchImages();

        /* Initial attempt */
        setTimeout(function() { synced = applyMeta(); }, 300);
        setTimeout(function() { syncRelated(); }, 500);
        setTimeout(function() { synced = applyMeta(); syncRelated(); }, 1500);
        setTimeout(function() { synced = applyMeta(); syncRelated(); }, 3000);

        /* Start polling */
        poll();

        /* Re-run on auth/profile ready */
        document.addEventListener('profileReady', function() {
          setTimeout(function() { synced = applyMeta(); syncRelated(); }, 300);
          setTimeout(function() { synced = applyMeta(); syncRelated(); }, 1000);
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>

</body>
</html>
